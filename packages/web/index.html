<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pipeit — pipe markdown out of your AI chats</title>
    <meta name="description" content="Share markdown from AI conversations. One command, one URL, no copy-paste through tokens." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;0,7..72,700;1,7..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Public+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#1a1a2e" />
    <script>
      // Apply persisted theme/skin before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("pipeit-theme");
          if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches))
            document.documentElement.classList.add("dark");
          document.documentElement.dataset.skin = localStorage.getItem("pipeit-skin") || "reading-room";
        } catch (e) {
          document.documentElement.dataset.skin = "reading-room";
        }
      })();
    </script>
    <meta property="og:type" content="website" />
    <meta property="og:title" content="pipeit — pipe markdown out of your AI chats" />
    <meta property="og:description" content="Share markdown from AI conversations. One command, one URL, no copy-paste through tokens." />
    <meta property="og:url" content="https://pipeit.live" />
    <meta property="og:image" content="https://pipeit.live/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="pipeit" />
    <meta name="twitter:description" content="Share markdown from AI conversations. One command, one URL." />
    <meta name="twitter:image" content="https://pipeit.live/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

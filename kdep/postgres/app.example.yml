# Example kdep config for the postgres dependency.
# Copy to app.yml; adjust storage class and resources for your cluster.
preset: statefulset_svc
namespace: pipeit
name: pipeit-postgres
image: postgres
tag: "17"
port: 5432
replicas: 1

image_pull_policy: IfNotPresent

cluster_ip: None

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

configmap:
  POSTGRES_DB: pipeit
  POSTGRES_USER: pipeit

volume_mounts:
  - name: pgdata
    mountPath: /var/lib/postgresql/data
    subPath: pgdata

storage:
  pgdata:
    size: 3Gi
    class: <your-storage-class>   # e.g. managed-csi (Azure), gp3 (AWS), standard (GKE)
    access_mode: ReadWriteOnce
